{% extends "base.html" %}

{% block title %}Генератор статей — Яндекс.Дзен{% endblock %}

{% block content %}
<div class="main-container">

   <!-- ── Form card ── -->
<div class="card">
    <form id="generate-form">
        <div class="form-group">
            <label for="topic-input">Тема статьи <span style="color:var(--color-text-muted); font-weight:400;">(необязательно)</span></label>
            <input type="text" id="topic-input" name="topic"
                   placeholder="Введите тему (или оставьте пустым для случайной)"
                   autocomplete="off">
            <div class="hint">Пожалуйста, введите тему статьи</div>
        </div>

        <div class="form-group">
            <label for="format-select">Формат:</label>
            <select id="format-select" class="form-control">
                <option value="article">📄 Статья (800-1000 слов)</option>
                <option value="social_post">📱 Пост для соцсетей (Instagram, VK)</option>
                <option value="twitter_thread">🐦 Тред для X (Twitter)</option>
                <option value="video_script">🎬 Сценарий для видео (YouTube, TikTok)</option>
                <option value="ad_post">💰 Рекламный пост (продающий)</option>
            </select>
        </div>

        <button type="submit" class="btn-primary" id="submit-btn">
            <span id="btn-text">Сгенерировать</span>
            <span id="btn-spinner" class="spinner" style="display:none"></span>
        </button>
    </form>
</div>

    <!-- ── Yandex.RSA Ad Block ── -->
    <div class="ad-block">
        <!-- Yandex.RTB R-A-19093580-1 -->
        <div id="yandex_rtb_R-A-19093580-1"></div>
        <script>
        window.yaContextCb.push(() => {
            Ya.Context.AdvManager.render({
                "blockId": "R-A-19093580-1",
                "renderTo": "yandex_rtb_R-A-19093580-1"
            })
        })
        </script>
        <!-- Место для рекламы РСЯ -->
    </div>

    <!-- ── Logs card ── -->
    <div class="card logs-card" id="logs-card">
        <div class="logs-header">
            <h3>📋 Процесс генерации</h3>
            <span id="status-badge" class="badge badge-running">Выполняется…</span>
        </div>
        <div id="logs-container"></div>
    </div>

    <!-- ── Result card ── -->
    <div class="card result-section" id="result-section">
        <div class="result-meta">
            <h3 id="result-topic"></h3>
            <p id="result-filename"></p>
        </div>
        <textarea id="article-editor" spellcheck="false"></textarea>
        <div class="action-buttons">
            <button class="btn-secondary btn-copy" id="copy-btn">📋 Скопировать</button>
            <button class="btn-secondary btn-download" id="download-btn">⬇ Скачать (.md)</button>
        </div>
    </div>

</div>
{% endblock %}

{% block extra_scripts %}
<script>
(function () {
    const form        = document.getElementById('generate-form');
    const topicInput  = document.getElementById('topic-input');
    const submitBtn   = document.getElementById('submit-btn');
    const btnText     = document.getElementById('btn-text');
    const btnSpinner  = document.getElementById('btn-spinner');
    const logsCard    = document.getElementById('logs-card');
    const logsContainer = document.getElementById('logs-container');
    const statusBadge = document.getElementById('status-badge');
    const resultSection = document.getElementById('result-section');
    const resultTopic  = document.getElementById('result-topic');
    const resultFilename = document.getElementById('result-filename');
    const articleEditor = document.getElementById('article-editor');
    const copyBtn = document.getElementById('copy-btn');
    const downloadBtn = document.getElementById('download-btn');

    let currentEventSource = null;
    let currentArticleFilename = '';

    function setBusy(busy) {
        submitBtn.disabled = busy;
        btnText.textContent = busy ? 'Генерация…' : 'Сгенерировать статью';
        btnSpinner.style.display = busy ? 'inline-block' : 'none';
    }

    function closeSSE() {
        if (currentEventSource) {
            currentEventSource.close();
            currentEventSource = null;
        }
    }

    function appendLog(text) {
        const isError = text.includes('ERROR');
        const div = document.createElement('div');
        div.className = 'log-line' + (isError ? ' log-error' : '');
        div.textContent = text;
        logsContainer.appendChild(div);
        logsContainer.scrollTop = logsContainer.scrollHeight;
    }

    form.addEventListener('submit', async function (e) {
    e.preventDefault();
    closeSSE();

    const topic = topicInput.value.trim();
    
    // ПРОВЕРКА: если тема не введена
    if (!topic) {
        appendLog("❌ Ошибка: введите тему статьи");
        statusBadge.className = 'badge badge-error';
        statusBadge.textContent = 'Ошибка ✗';
        logsCard.style.display = 'block';
        setBusy(false);
        return;
    }

    const format = document.getElementById('format-select').value;

    // ... остальной код (очистка логов, отправка запроса и т.д.)
});

        // Reset UI
        logsContainer.innerHTML = '';
        resultSection.style.display = 'none';
        logsCard.style.display = 'block';
        statusBadge.className = 'badge badge-running';
        statusBadge.textContent = 'Выполняется…';
        setBusy(true);

        try {
            const resp = await fetch('/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ topic: topic }),
            });
            const data = await resp.json();
            const jobId = data.job_id;

            // Open SSE stream
            currentEventSource = new EventSource('/stream/' + jobId);

            currentEventSource.onmessage = function (e) {
                const msg = e.data;
                if (msg.startsWith('__STATUS__:')) {
                    const status = msg.replace('__STATUS__:', '');
                    if (status === 'done') {
                        statusBadge.className = 'badge badge-done';
                        statusBadge.textContent = 'Готово ✓';
                        appendLog('✅ Генерация завершена!');
                        // Load result
                        loadResult(jobId);
                    } else if (status === 'error') {
                        statusBadge.className = 'badge badge-error';
                        statusBadge.textContent = 'Ошибка ✗';
                        appendLog('❌ Произошла ошибка при генерации.');
                        setBusy(false);
                    }
                    closeSSE();
                } else {
                    appendLog(msg);
                }
            };

            currentEventSource.onerror = function () {
                closeSSE();
                // Fallback: poll status once
                pollStatus(jobId);
            };

        } catch (err) {
            appendLog('ERROR: ' + err.message);
            statusBadge.className = 'badge badge-error';
            statusBadge.textContent = 'Ошибка ✗';
            setBusy(false);
        }
    });

    async function pollStatus(jobId) {
        try {
            const resp = await fetch('/status/' + jobId);
            const data = await resp.json();
            // Show remaining logs
            const existingCount = logsContainer.children.length;
            data.logs.slice(existingCount).forEach(l => appendLog(l));

            if (data.status === 'done') {
                statusBadge.className = 'badge badge-done';
                statusBadge.textContent = 'Готово ✓';
                loadResultFromData(data.result);
            } else if (data.status === 'error') {
                statusBadge.className = 'badge badge-error';
                statusBadge.textContent = 'Ошибка ✗';
            }
            setBusy(false);
        } catch (_) {
            setBusy(false);
        }
    }

    async function loadResult(jobId) {
        try {
            const resp = await fetch('/status/' + jobId);
            const data = await resp.json();
            if (data.result) {
                loadResultFromData(data.result);
            }
        } catch (_) {}
        setBusy(false);
    }

    function loadResultFromData(result) {
        if (!result) return;
        resultSection.style.display = 'block';
        resultTopic.textContent = result.topic;
        resultFilename.textContent = 'Файл: ' + result.filename;
        articleEditor.value = result.article;
        currentArticleFilename = result.filename || 'article.md';

        // Прокрутка к результату
        resultSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // ── Copy button ──
    copyBtn.addEventListener('click', async function () {
        const text = articleEditor.value;
        try {
            await navigator.clipboard.writeText(text);
            copyBtn.textContent = '✅ Скопировано!';
            setTimeout(function () { copyBtn.textContent = '📋 Скопировать'; }, 2000);
        } catch (err) {
            copyBtn.textContent = '❌ Ошибка';
            setTimeout(function () { copyBtn.textContent = '📋 Скопировать'; }, 2000);
        }
    });

    // ── Download button ──
    downloadBtn.addEventListener('click', function () {
        const text = articleEditor.value;
        const blob = new Blob([text], { type: 'text/markdown;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = currentArticleFilename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    });
})();
</script>
{% endblock %}
